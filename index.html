<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Generator</title>

    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Quiz Generator</h1>
            <p>Create interactive quizzes from your study materials</p>
        </div>
        
        <div class="input-section" id="inputSection">
            <div class="section">
                <h2>Create Your Quiz</h2>
                
                <div class="example-text">
                    <strong>Format Example:</strong>
                    @Q: What is the capital of France?<br>
                    @A: Madrid<br>
                    @A: Berlin<br>
                    @A*: Paris<br>
                    @A: Rome<br><br>
                    
                    @Q: Which planet is closest to the Sun?<br>
                    @A*: Mercury<br>
                    @A: Venus<br>
                    @A: Earth<br>
                    @A: Mars
                </div>
                
                <textarea 
                    id="quizInput" 
                    placeholder="Paste your quiz text here using the format above..."></textarea>
                
                <button class="btn" onclick="generateQuiz()">Generate Quiz</button>
                
                <div id="errorMessage" class="error-message"></div>
            </div>
        </div>
        
        <div class="quiz-section" id="quizSection">
            <div id="questionContainer"></div>
            
            <div class="quiz-controls">
                <div class="navigation">
                    <button class="nav-btn" id="prevBtn" onclick="previousQuestion()">← Previous</button>
                    <button class="nav-btn" id="nextBtn" onclick="nextQuestion()">Next →</button>
                    <button class="nav-btn primary" id="finishBtn" onclick="finishQuiz()" style="display: none;">Finish Quiz</button>
                </div>
            </div>

            <div id="errorMessageQuiz" class="error-message"></div>
        </div>
        
        <div class="results-section" id="resultsSection">
            <div class="final-score" id="finalScore">0%</div>
            <div class="score-message" id="scoreMessage"></div>
            <div class="button-group">
                <button class="btn" onclick="restartQuiz()">Try Again</button>
                <button class="btn btn-secondary" onclick="newQuiz()">New Quiz</button>
            </div>
        </div>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Quiz Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 30px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            backdrop-filter: blur(10px);
        }

        .header {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
        }

        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .content {
            padding: 40px;
        }

        .textarea-container {
            position: relative;
            margin-bottom: 20px;
        }

        textarea {
            width: 100%;
            min-height: 200px;
            padding: 20px;
            border: 2px solid #e0e0e0;
            border-radius: 15px;
            font-size: 16px;
            font-family: 'Courier New', monospace;
            resize: vertical;
            transition: all 0.3s ease;
            background: #fafafa;
        }

        textarea:focus {
            outline: none;
            border-color: #4facfe;
            box-shadow: 0 0 20px rgba(79, 172, 254, 0.2);
            background: white;
        }

        .example-text {
            background: #f8f9fa;
            border: 1px solid #e9ecef;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            color: #495057;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 25px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.6);
        }

        .btn:active {
            transform: translateY(0);
        }

        .quiz-section {
            display: none;
            animation: fadeIn 0.5s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .question-card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            border-left: 5px solid #4facfe;
        }

        .question-header {
            display: flex;
            justify-content: between;
            align-items: center;
            margin-bottom: 20px;
        }

        .question-number {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 14px;
        }

        .question-text {
            font-size: 1.3rem;
            font-weight: 600;
            color: #333;
            margin-bottom: 25px;
            line-height: 1.5;
        }

        .answers {
            display: grid;
            gap: 15px;
        }

        .answer-option {
            background: #f8f9fa;
            border: 2px solid #e9ecef;
            border-radius: 12px;
            padding: 15px 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 16px;
            position: relative;
            overflow: hidden;
        }

        .answer-option:hover {
            background: #e3f2fd;
            border-color: #4facfe;
            transform: translateX(5px);
        }

        .answer-option.selected {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            border-color: #4facfe;
            color: white;
            transform: scale(1.02);
        }

        .answer-option.correct {
            background: linear-gradient(135deg, #4caf50 0%, #45a049 100%);
            border-color: #4caf50;
            color: white;
        }

        .answer-option.incorrect {
            background: linear-gradient(135deg, #f44336 0%, #d32f2f 100%);
            border-color: #f44336;
            color: white;
        }

        .quiz-controls {
            display: flex;
            justify-content: end;
            align-items: center;
            margin-top: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 15px;
        }

        .score-display {
            font-size: 1.2rem;
            font-weight: 600;
            color: #333;
        }

        .navigation {
            display: flex;
            gap: 15px;
        }

        .nav-btn {
            background: #6c757d;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .nav-btn:hover {
            background: #5a6268;
            transform: translateY(-1px);
        }

        .nav-btn:disabled {
            background: #adb5bd;
            cursor: not-allowed;
            transform: none;
        }

        .results-section {
            display: none;
            text-align: center;
            padding: 40px;
            background: white;
            border-radius: 15px;
            margin-top: 30px;
        }

        .final-score {
            font-size: 3rem;
            font-weight: 700;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .score-message {
            font-size: 1.3rem;
            margin-bottom: 30px;
            color: #555;
        }

        .error-message {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 10px;
            margin-top: 30px;
            border: 1px solid #f5c6cb;
        }

        .detailed-review {
            margin: 30px 0;
            text-align: left;
        }

        .review-question {
            background: white;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            border-left: 5px solid #e9ecef;
        }

        .review-question.has-error {
            border-left-color: #f44336;
        }

        .review-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .review-question-number {
            background: #6c757d;
            color: white;
            padding: 6px 12px;
            border-radius: 15px;
            font-size: 14px;
            font-weight: 600;
        }

        .review-status {
            padding: 6px 12px;
            border-radius: 15px;
            font-size: 14px;
            font-weight: 600;
        }

        .review-status.correct {
            background: #d4edda;
            color: #155724;
        }

        .review-status.incorrect {
            background: #f8d7da;
            color: #721c24;
        }

        .review-question-text {
            font-size: 1.1rem;
            font-weight: 600;
            color: #333;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .review-answers {
            display: grid;
            gap: 12px;
        }

        .review-answer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 18px;
            border-radius: 10px;
            background: #f8f9fa;
            border: 2px solid #e9ecef;
            transition: all 0.3s ease;
        }

        .review-correct {
            background: linear-gradient(135deg, #d4edda 0%, #c3e6cb 100%);
            border-color: #28a745;
            color: #155724;
        }

        .review-user-wrong {
            background: linear-gradient(135deg, #f8d7da 0%, #f5c6cb 100%);
            border-color: #dc3545;
            color: #721c24;
        }

        .answer-text {
            flex: 1;
            font-weight: 500;
        }

        .answer-label {
            font-size: 13px;
            font-weight: 700;
            padding: 4px 8px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.8);
        }

        .review-correct .answer-label {
            background: rgba(21, 87, 36, 0.1);
        }

        .review-user-wrong .answer-label {
            background: rgba(114, 28, 36, 0.1);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📚 Quiz Generator</h1>
            <p>Transform your study notes into interactive quizzes</p>
        </div>
        
        <div class="content">
            <div class="input-section" id="inputSection">
                <h2 style="margin-bottom: 20px; color: #333;">Create Your Quiz</h2>
                
                <div class="example-text">
                    <strong>Format Example:</strong><br>
                    @Q: What is the capital of France?<br>
                    @A: Madrid<br>
                    @A: Berlin<br>
                    @A*: Paris<br>
                    @A: Rome<br><br>
                    
                    @Q: Which planet is closest to the Sun?<br>
                    @A*: Mercury<br>
                    @A: Venus<br>
                    @A: Earth<br>
                    @A: Mars
                </div>
                
                <div class="textarea-container">
                    <textarea 
                        id="quizInput" 
                        placeholder="Paste your quiz text here using the format above..."></textarea>
                </div>
                
                <button class="btn" onclick="generateQuiz()">🚀 Generate Quiz</button>
                
                <div id="errorMessage" class="error-message" style="display: none;"></div>
            </div>
            
            <div class="quiz-section" id="quizSection">
                <div id="questionContainer"></div>
                
                <div class="quiz-controls">
                    <div class="navigation">
                        <button class="nav-btn" id="prevBtn" onclick="previousQuestion()">← Previous</button>
                        <button class="nav-btn" id="nextBtn" onclick="nextQuestion()">Next →</button>
                        <button class="nav-btn" id="finishBtn" onclick="finishQuiz()" style="display: none; background: #28a745;">Finish Quiz</button>
                    </div>
                </div>

                <div id="errorMessageQuiz" class="error-message" style="display: none;"></div>
            </div>
            
            <div class="results-section" id="resultsSection">
                <div class="final-score" id="finalScore">0%</div>
                <div class="score-message" id="scoreMessage"></div>
                <button class="btn" onclick="restartQuiz()">🔄 Try Again</button>
                <button class="btn" onclick="newQuiz()" style="margin-left: 15px;">📝 New Quiz</button>
            </div>
        </div>
    </div>

    <script>
        let questions = [];
        let currentQuestion = 0;
        let userAnswers = [];
        let score = 0;
        let quizFinished = false;

        function parseQuizText(text) {
            const lines = text.split('\n').map(line => line.trim()).filter(line => line);
            const parsedQuestions = [];
            let currentQ = null;

            for (const line of lines) {
                if (line.startsWith('@Q:')) {
                    if (currentQ) {
                        parsedQuestions.push(currentQ);
                    }
                    currentQ = {
                        question: line.substring(3).trim(),
                        answers: [],
                        correctIndex: -1
                    };
                } else if (line.startsWith('@A*:')) {
                    if (currentQ) {
                        currentQ.correctIndex = currentQ.answers.length;
                        currentQ.answers.push(line.substring(4).trim());
                    }
                } else if (line.startsWith('@A:')) {
                    if (currentQ) {
                        currentQ.answers.push(line.substring(3).trim());
                    }
                }
            }

            if (currentQ) {
                parsedQuestions.push(currentQ);
            }

            return parsedQuestions;
        }

        function generateQuiz() {
            const input = document.getElementById('quizInput').value.trim();
            const errorDiv = document.getElementById('errorMessage');
            
            if (!input) {
                showError('Please enter quiz text!');
                return;
            }

            try {
                questions = parseQuizText(input);
                
                if (questions.length === 0) {
                    showError('No valid questions found. Please check your format!');
                    return;
                }

                // Validate questions
                for (let i = 0; i < questions.length; i++) {
                    const q = questions[i];
                    if (!q.question || q.answers.length === 0 || q.correctIndex === -1) {
                        showError(`Question ${i + 1} is incomplete. Make sure it has a question, answers, and a correct answer marked with @A*:`);
                        return;
                    }
                }

                hideError();
                startQuiz();
            } catch (error) {
                showError('Error parsing quiz text. Please check your format!');
            }
        }

        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
        }

        function hideError() {
            document.getElementById('errorMessage').textContent = '';
            document.getElementById('errorMessage').style.display = 'none';
        }
        
        function showErrorQuiz(message) {
            const errorDiv = document.getElementById('errorMessageQuiz');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
        }

        function hideErrorQuiz() {
            document.getElementById('errorMessageQuiz').textContent = '';
            document.getElementById('errorMessageQuiz').style.display = 'none';
        }


        function startQuiz() {
            currentQuestion = 0;
            userAnswers = new Array(questions.length).fill(-1);
            score = 0;
            quizFinished = false;

            document.getElementById('inputSection').style.display = 'none';
            document.getElementById('quizSection').style.display = 'block';
            document.getElementById('resultsSection').style.display = 'none';

            displayQuestion();
            updateScore();
        }

        function displayQuestion() {
            const question = questions[currentQuestion];
            const container = document.getElementById('questionContainer');
            
            let html = `
                <div class="question-card">
                    <div class="question-header">
                        <div class="question-number">Question ${currentQuestion + 1} of ${questions.length}</div>
                    </div>
                    <div class="question-text">${question.question}</div>
                    <div class="answers">
            `;

            question.answers.forEach((answer, index) => {
                const isSelected = userAnswers[currentQuestion] === index;
                const isCorrect = index === question.correctIndex;
                const isIncorrect = quizFinished && isSelected && !isCorrect;
                const showCorrect = quizFinished && isCorrect;
                
                let classes = 'answer-option';
                if (isSelected && !quizFinished) classes += ' selected';
                if (showCorrect) classes += ' correct';
                if (isIncorrect) classes += ' incorrect';
                
                html += `
                    <div class="${classes}" onclick="selectAnswer(${index})">
                        ${answer}
                    </div>
                `;
            });

            html += `
                    </div>
                </div>
            `;

            container.innerHTML = html;
            updateNavigation();
        }

        function selectAnswer(answerIndex) {
            if (quizFinished) return;
            
            userAnswers[currentQuestion] = answerIndex;
            displayQuestion();
            updateScore();
        }

        function updateScore() {
            score = 0;
            for (let i = 0; i < questions.length; i++) {
                if (userAnswers[i] === questions[i].correctIndex) {
                    score++;
                }
            }
        }

        function updateNavigation() {
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');
            const finishBtn = document.getElementById('finishBtn');
            
            prevBtn.disabled = currentQuestion === 0;
            nextBtn.disabled = currentQuestion === questions.length - 1;
            
            if (currentQuestion === questions.length - 1) {
                nextBtn.style.display = 'none';
                finishBtn.style.display = 'inline-block';
            } else {
                nextBtn.style.display = 'inline-block';
                finishBtn.style.display = 'none';
            }
        }

        function previousQuestion() {
            if (currentQuestion > 0) {
                currentQuestion--;
                displayQuestion();
            }
        }

        function nextQuestion() {
            if (currentQuestion < questions.length - 1) {
                currentQuestion++;
                displayQuestion();
            }
        }

        function finishQuiz() {
            if (userAnswers.includes(-1)) {
                showErrorQuiz('Please answer all questions before finishing the quiz!');
                return;
            }

            quizFinished = true;
            
            // Show all correct answers
            displayQuestion();
            
            // Show results
            document.getElementById('quizSection').style.display = 'none';
            showResults();
        }

        function showResults() {
            const percentage = Math.round((score / questions.length) * 100);
            document.getElementById('finalScore').textContent = `${percentage}%`;
            
            let message = '';
            if (percentage >= 90) {
                message = '🏆 Excellent! You\'ve mastered this topic!';
            } else if (percentage >= 70) {
                message = '👍 Great job! You have a good understanding!';
            } else if (percentage >= 50) {
                message = '📚 Not bad! Review the material and try again!';
            } else {
                message = '💪 Keep studying! Practice makes perfect!';
            }
            
            message += `<br><br>You got ${score} out of ${questions.length} questions correct.`;
            
            document.getElementById('scoreMessage').innerHTML = message;
            
            // Generate detailed review
            generateDetailedReview();
            
            document.getElementById('resultsSection').style.display = 'block';
        }

        function generateDetailedReview() {
            let reviewHtml = '<div class="detailed-review"><h3 style="margin-bottom: 25px; color: #333; font-size: 1.5rem;">📋 Detailed Review</h3>';
            
            questions.forEach((question, qIndex) => {
                const userAnswer = userAnswers[qIndex];
                const correctAnswer = question.correctIndex;
                const isCorrect = userAnswer === correctAnswer;
                
                reviewHtml += `
                    <div class="review-question">
                        <div class="review-header">
                            <span class="review-question-number">Question ${qIndex + 1}</span>
                            <span class="review-status ${isCorrect ? 'correct' : 'incorrect'}">
                                ${isCorrect ? '✅ Correct' : '❌ Incorrect'}
                            </span>
                        </div>
                        <div class="review-question-text">${question.question}</div>
                        <div class="review-answers">
                `;
                
                question.answers.forEach((answer, aIndex) => {
                    const isUserAnswer = userAnswer === aIndex;
                    const isCorrectAnswer = correctAnswer === aIndex;
                    
                    let answerClass = 'review-answer';
                    let answerLabel = '';
                    
                    if (isCorrectAnswer) {
                        answerClass += ' review-correct';
                        answerLabel = '✓ Correct Answer';
                    }
                    
                    if (isUserAnswer && !isCorrectAnswer) {
                        answerClass += ' review-user-wrong';
                        answerLabel = '✗ Your Answer';
                    }
                    
                    if (isUserAnswer && isCorrectAnswer) {
                        answerLabel = '✓ Your Correct Answer';
                    }
                    
                    reviewHtml += `
                        <div class="${answerClass}">
                            <span class="answer-text">${answer}</span>
                            ${answerLabel ? `<span class="answer-label">${answerLabel}</span>` : ''}
                        </div>
                    `;
                });
                
                reviewHtml += '</div></div>';
            });
            
            reviewHtml += '</div>';
            
            // Insert review before the restart buttons
            const resultsSection = document.getElementById('resultsSection');
            const existingReview = resultsSection.querySelector('.detailed-review');
            if (existingReview) {
                existingReview.remove();
            }
            
            const buttonsDiv = resultsSection.querySelector('.btn').parentElement;
            buttonsDiv.insertAdjacentHTML('beforebegin', reviewHtml);
        }

        function restartQuiz() {
            hideError();
            hideErrorQuiz();
            document.querySelector('.detailed-review').remove();
            
            startQuiz();
        }

        function newQuiz() {
            document.getElementById('inputSection').style.display = 'block';
            document.getElementById('quizSection').style.display = 'none';
            document.getElementById('resultsSection').style.display = 'none';
            document.querySelector('.detailed-review').remove();
            document.getElementById('quizInput').value = '';
            hideError();
            hideErrorQuiz();
        }
    </script>
</body>
</html>
